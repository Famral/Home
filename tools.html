<head>

    <style>
        section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 22px;
            max-width: 1050px;
            margin: 10px auto;
            padding: 10px;
            background-color: #fff;
            border-radius: 0px;
        }

        .tool {
            border: 1px solid #dddddd77;
            padding: 15px;
            border-radius: 0px;
            transition: transform 0.3s;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .tool:hover {
            border: 1px dashed #7c7c7c;
            padding: 15px;
            border-radius: 0px;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 0.1, 0, 0.2);
        }

        .tool h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #2f3f88;
        }

        .tool p {
            font-size: 16px;
            margin-bottom: 15px;
            color: rgb(104, 104, 104);
        }

        .tool a {
            display: inline-block;
            padding: 10px;
            background-color: #ffffff;
            color: #2600ff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 0px;
            transition: background-color 0.2s;
        }

        .tool a:hover {
            background-color: #ebebff;
            border-bottom: 2px solid rgb(4, 0, 255);
        }

        .footer-redinner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
    </style>




</head>

<body>
    <div class="container">
        <!-- Nav -->
        <nav class="main-nav">
            <img src="https://www.famral.com/logo.png" alt="Famral Logo" class="logo">

                <li><a href="https://www.famral.com">Home</a></li>
                <li><a href="https://tools.famral.com/">Tools</a></li>
            </ul>
