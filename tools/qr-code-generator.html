<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="https://www.famral.com/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | Generate Free QR Code for Link</title>

<!-- Google tag (gtag.js) -->
<script asyncsrc="https://www.googletagmanager.com/gtag/js?id=G-77313KVE2V"></script>

  window.dataLayer= window.dataLayer|| [];

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #2f4050;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 36px;
        }

        main {
            display: flex;
            justify-content: space-between;
            max-width: 90%;
            margin: 20px auto;
            padding: 20px;
            background-color: #ecf0f1;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            text-align: center;
        }

        left-container {
            flex: 1;
            text-align: left;
            padding-right: 10px; /* Adjusted padding */
        }

        right-container {
            flex: 1;
            text-align: center;
            padding-left: 10px; /* Adjusted padding */
        }

        label {
            font-size: 18px;
            display: block;
            margin-bottom: 10px;
        }

        input {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        button {
            background-color: #2ecc71;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        img {
            margin-top: 20px;
            margin-bottom: 20px;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 4px solid #fff;
        }

        footer {
            background-color: rgb(199, 199, 199);
            color: #000000;
            text-align: center;
            padding: 10px;
            text-decoration: none;
        }

        footer a{
            color: #000000;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            main {
                flex-direction: column;
            }

            left-container, right-container {
                width: 100%;
                padding: 0;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>QR Code Generator</h1>
</header>

<main>
    <div class="left-container">
        <label for="content">Enter website link:</label>
        <input type="text" id="content" placeholder="e.g., https://www.example.com">

        <label for="size">Enter QR code size (pixels):</label>
        <input type="number" id="size" placeholder="Enter size" min="1" value="200">

        <label for="color">Choose QR code color:</label>
        <input type="color" id="color" value="#000000">

        <label for="backgroundColor">Choose background color:</label>
        <input type="color" id="backgroundColor" value="#ffffff">

        <button onclick="generateQRCode()">Generate QR Code</button>
    </div>

    <div class="right-container">
        <div id="qrcode"></div>
        <button id="downloadButton" onclick="downloadQRCode()" style="display: none;">Download QR Code</button>
    </div>
</main>

<footer>
    <p>&copy; <a href="https://www.famral.com/tools/qr-code-generator">Free QR Code Generator</a>.</p>
</footer>

<script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
<script>
    function generateQRCode() {
        var content = document.getElementById('content').value;
        var size = document.getElementById('size').value;
        var color = document.getElementById('color').value;
        var backgroundColor = document.getElementById('backgroundColor').value;

        if (content.trim() === '') {
            alert('Please enter content for the QR code.');
            return;
        }

        // Clear the existing QR code
        document.getElementById('qrcode').innerHTML = '';

        // Generate the new QR code with customization
        var qrcode = new QRCode(document.getElementById('qrcode'), {
            text: content,
            width: size,
            height: size,
            colorDark: color,
            colorLight: backgroundColor,
        });

        // Show the download button
        document.getElementById('downloadButton').style.display = 'inline-block';
    }

    function downloadQRCode() {
        var canvas = document.createElement('canvas');
        var context = canvas.getContext('2d');

        var qrCodeCanvas = document.getElementById('qrcode').querySelector('canvas');

        if (!qrCodeCanvas) {
            alert('No QR code to download. Generate a QR code first.');
            return;
        }

        var size = parseInt(document.getElementById('size').value, 10);
        var margin = 20;

        canvas.width = qrCodeCanvas.width + 2 * margin;
        canvas.height = qrCodeCanvas.height + 2 * margin;

        context.fillStyle = '#fff'; // Set the margin color to white
        context.fillRect(0, 0, canvas.width, canvas.height);

        context.drawImage(qrCodeCanvas, margin, margin);

        var dataURL = canvas.toDataURL('image/png');

        var a = document.createElement('a');
        a.href = dataURL;
        a.download = 'qrcode.png';
        a.click();
    }
</script>

</body>
</html>
